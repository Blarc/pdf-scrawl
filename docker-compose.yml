services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bun", "dist/server.js"]
    env_file:
      - server/.env
    ports:
      - "1234:1234"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=1234
    volumes:
      - pdf-rooms:/tmp/pdf-rooms

volumes:
  pdf-rooms:
