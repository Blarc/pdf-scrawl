version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "1234:1234"
    environment:
      - HOST=0.0.0.0
      - PORT=1234
    volumes:
      - pdf-rooms:/tmp/pdf-rooms

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_WS_URL=ws://localhost:1234
        - VITE_API_URL=http://localhost:1234
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pdf-rooms:
